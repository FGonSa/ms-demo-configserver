services:
  config-server:
    build: ./config-server
    container_name: ${CONFIG_SERVER_NAME}
    ports:
      - "${CONFIG_PORT}:${CONFIG_PORT}"
    environment:
      - EUREKA_URL=http://${EUREKA_SERVER_NAME}:${EUREKA_PORT}/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${CONFIG_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./eureka-server
    container_name: ${EUREKA_SERVER_NAME}
    ports:
      - "${EUREKA_PORT}:${EUREKA_PORT}"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://${CONFIG_SERVER_NAME}:${CONFIG_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${EUREKA_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: ${GATEWAY_NAME}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:     
      SPRING_CONFIG_IMPORT: "configserver:http://${CONFIG_SERVER_NAME}:${CONFIG_PORT}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://${EUREKA_SERVER_NAME}:${EUREKA_PORT}/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT}/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"

  db-product:
    image: postgres:15
    container_name: ${DB_PRODUCT_CONTAINER}
    environment:
      POSTGRES_DB: ${DB_PRODUCT_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PRODUCT_PORT}:5432"

  db-order:
    image: postgres:15
    container_name: ${DB_ORDER_CONTAINER}
    environment:
      POSTGRES_DB: ${DB_ORDER_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_ORDER_PORT}:5432"

  service-product:
    build: ./service-product
    container_name: service-product
    depends_on:
      config-server:             
        condition: service_healthy # Espera a que el Config esté sano
      db-product:
        condition: service_started
      api-gateway:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://${CONFIG_SERVER_NAME}:${CONFIG_PORT}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://${EUREKA_SERVER_NAME}:${EUREKA_PORT}/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_PRODUCT_CONTAINER}:5432/${DB_PRODUCT_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_NAME}:${KAFKA_PORT}
    ports:
      - "${PRODUCT_PORT}:${PRODUCT_PORT}"

  service-order:
    build: ./service-order
    container_name: service-order
    depends_on:
      config-server:              
        condition: service_healthy # Espera a que el Config esté sano
      db-order:
        condition: service_started
      api-gateway:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://${CONFIG_SERVER_NAME}:${CONFIG_PORT}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://${EUREKA_SERVER_NAME}:${EUREKA_PORT}/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_ORDER_CONTAINER}:5432/${DB_ORDER_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_NAME}:${KAFKA_PORT} # Se conecta a KAFKA
    ports:
      - "${ORDER_PORT}:${ORDER_PORT}"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ${ZOO_NAME}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ${KAFKA_NAME}
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ${ZOO_NAME}:${ZOOKEEPER_PORT}
      # Definimos dos vías: INTERNA para los contenedores y EXTERNA para tu PC
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://${KAFKA_NAME}:${KAFKA_PORT},EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "${KAFKA_UI_PORT}:${KAFKA_UI_PORT}"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_NAME}:${KAFKA_PORT} # Para encontrar a KAFKA
      KAFKA_CLUSTERS_0_ZOOKEEPER: ${ZOO_NAME}:${ZOOKEEPER_PORT} # Para encontrar a ZOOKEEPER
      AUTH_TYPE: DISABLED
      SERVER_PORT: ${KAFKA_UI_PORT} # Para que el contenedor use el 9080 internamente
