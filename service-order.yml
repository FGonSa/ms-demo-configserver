global:
  message: Estás en el entorno DEFAULT
spring:
  application:
    name: service-order
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: f5antos
    password: 123456
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8083

resilience4j:
  circuitbreaker:
    instances:
      productosCB:
        slidingWindowSize: 6          # Mira las últimas 6 llamadas
        failureRateThreshold: 50      # Si 3 de 6 fallan, abre el circuito
        waitDurationInOpenState: 20s  # Tiempo que se queda el "fusible" fuera
        permittedNumberOfCallsInHalfOpenState: 2

  retry:
    instances:
      productosRetry:
        maxAttempts: 3                # Reintenta hasta 3 veces
        waitDuration: 1s              # Espera 1s entre reintentos
        retryExceptions:
          - java.io.IOException       # Solo reintenta si es error de red

  timelimiter:
    instances:
      productosTL:
        timeoutDuration: 2s           # Si tarda más de 2s, corta la conexión
